spring:
  application:
    name: spring-ai-tool-calling
  ai:
    openai:
      api-key: ${OPEN_AI_API_KEY}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/spring_ai_tool_calling
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false
logging:
  level:
    org.springframework.ai: DEBUG